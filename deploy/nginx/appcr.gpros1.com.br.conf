limit_req_zone $binary_remote_addr zone=login_zone:10m rate=10r/m;
limit_req_zone $binary_remote_addr zone=upload_zone:10m rate=20r/m;

log_format security '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent"';

server {
    listen 80;
    server_name appcr.gpros1.com.br;

    access_log /var/log/nginx/appcr_access.log security;
    error_log /var/log/nginx/appcr_error.log warn;

    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    location / {
        proxy_pass http://127.0.0.1:8092;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /controller/usuario.controller.php {
        if ($arg_job = autenticarUsuario) {
            limit_req zone=login_zone burst=20 nodelay;
        }
        proxy_pass http://127.0.0.1:8092;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /controller/salvar_arquivo.php {
        limit_req zone=upload_zone burst=20 nodelay;
        client_max_body_size 6m;
        proxy_pass http://127.0.0.1:8092;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # bloqueia acesso direto a diretório de upload caso exista no webroot
    location ^~ /uploads/ {
        deny all;
        return 403;
    }

    location = /controller/migrar.controller.php {
        deny all;
        return 403;
    }

    location = /controller/migrar_50_75.controller.php {
        deny all;
        return 403;
    }
}
